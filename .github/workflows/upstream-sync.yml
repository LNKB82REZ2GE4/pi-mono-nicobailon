name: Upstream Sync

on:
  schedule:
    # Run daily at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/badlogic/pi-mono.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for upstream changes
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          
          if [ "$BEHIND" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "### 📥 Upstream has $BEHIND new commit(s):" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            git log --oneline HEAD..upstream/main >> $GITHUB_STEP_SUMMARY
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "### ✅ Already up to date with upstream" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for existing PR
        id: existing_pr
        if: steps.check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head "upstream-sync" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "number=$EXISTING" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create sync branch
        if: steps.check.outputs.has_changes == 'true' && steps.existing_pr.outputs.exists != 'true'
        run: |
          git checkout -b upstream-sync
          git merge upstream/main --no-edit || {
            echo "### ⚠️ Merge conflicts detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The PR will be created with conflicts. Resolve them manually." >> $GITHUB_STEP_SUMMARY
            git add -A
            git commit -m "Merge upstream with conflicts" || true
          }

      - name: Push sync branch
        if: steps.check.outputs.has_changes == 'true' && steps.existing_pr.outputs.exists != 'true'
        run: git push origin upstream-sync --force

      - name: Create PR
        id: create_pr
        if: steps.check.outputs.has_changes == 'true' && steps.existing_pr.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMITS=$(git log --oneline main..upstream/main | head -20 || true)
          BEHIND=${{ steps.check.outputs.behind }}

          BODY_FILE=$(mktemp)
          PAYLOAD_FILE=$(mktemp)
          cat > "$BODY_FILE" <<'EOF'
          ## Upstream Sync

          This PR brings in the latest changes from [badlogic/pi-mono](https://github.com/badlogic/pi-mono).

          ### New Commits (__BEHIND__ total)
          ```text
          __COMMITS__
          ```

          ---

          **Instructions:**
          1. Review the changes below
          2. Resolve any merge conflicts if present
          3. Merge when ready
          4. Delete this branch after merging

          _This PR was automatically created by the [Upstream Sync](/.github/workflows/upstream-sync.yml) workflow._
          EOF

          BODY_FILE="$BODY_FILE" PAYLOAD_FILE="$PAYLOAD_FILE" COMMITS="$COMMITS" BEHIND="$BEHIND" python - <<'PY'
          import json
          import os
          from pathlib import Path

          body_path = Path(os.environ["BODY_FILE"])
          body = body_path.read_text()
          body = body.replace("__BEHIND__", os.environ["BEHIND"])
          body = body.replace("__COMMITS__", os.environ["COMMITS"])
          body_path.write_text(body)

          payload = {
              "title": f"🔄 Sync upstream: {os.environ['BEHIND']} new commit(s)",
              "head": "upstream-sync",
              "base": "main",
              "body": body,
          }
          Path(os.environ["PAYLOAD_FILE"]).write_text(json.dumps(payload))
          PY

          PR_JSON=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "repos/${GITHUB_REPOSITORY}/pulls" \
            --input "$PAYLOAD_FILE")
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          PR_URL=$(echo "$PR_JSON" | jq -r '.html_url')

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "### 🔁 Created PR #$PR_NUMBER" >> $GITHUB_STEP_SUMMARY
          echo "$PR_URL" >> $GITHUB_STEP_SUMMARY

          if gh api "repos/${GITHUB_REPOSITORY}/labels/upstream-sync" >/dev/null 2>&1; then
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/issues/$PR_NUMBER/labels" \
              -f labels[]=upstream-sync >/dev/null
          fi

          rm -f "$BODY_FILE" "$PAYLOAD_FILE"
