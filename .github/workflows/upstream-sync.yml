name: Upstream Sync

on:
  schedule:
    # Run daily at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/badlogic/pi-mono.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for upstream changes
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT

          if [ "$BEHIND" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "### Upstream has $BEHIND new commit(s):" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            git log --oneline HEAD..upstream/main >> $GITHUB_STEP_SUMMARY
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "### Already up to date with upstream" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Attempt merge and auto-resolve known conflicts
        id: merge
        if: steps.check.outputs.has_changes == 'true'
        run: |
          if git merge upstream/main --no-edit -m "Merge upstream/main into main"; then
            echo "status=clean" >> $GITHUB_OUTPUT
          else
            # Collect conflicting files
            CONFLICTS=$(git diff --name-only --diff-filter=U | tr '\n' ' ')
            UNRESOLVED=""

            for f in $(git diff --name-only --diff-filter=U); do
              case "$f" in
                packages/coding-agent/CHANGELOG.md)
                  # Auto-resolve: preserve our [Unreleased] block above upstream's new release sections
                  python3 - "$f" <<'PY'
          import sys, re

          path = sys.argv[1]
          text = open(path).read()

          def resolve(text):
              pattern = re.compile(
                  r'<<<<<<< HEAD\n(.*?)\n=======\n(.*?)\n>>>>>>> [^\n]+\n',
                  re.DOTALL
              )
              def pick(m):
                  ours = m.group(1).rstrip('\n')
                  theirs = m.group(2).rstrip('\n')
                  return ours + '\n\n' + theirs + '\n'
              resolved = pattern.sub(pick, text)
              if '<<<<<<<' in resolved or '>>>>>>>' in resolved:
                  return None
              return resolved

          result = resolve(text)
          if result:
              open(path, 'w').write(result)
              sys.exit(0)
          sys.exit(1)
          PY
                  if [ $? -eq 0 ]; then
                    git add "$f"
                    echo "Auto-resolved: $f (CHANGELOG — kept local [Unreleased], appended upstream releases)" >> $GITHUB_STEP_SUMMARY
                  else
                    UNRESOLVED="$UNRESOLVED $f"
                  fi
                  ;;
                packages/ai/src/models.generated.ts)
                  # Auto-resolve: take upstream (file is auto-generated)
                  git checkout --theirs "$f"
                  git add "$f"
                  echo "Auto-resolved: $f (auto-generated — accepted upstream)" >> $GITHUB_STEP_SUMMARY
                  ;;
                *)
                  UNRESOLVED="$UNRESOLVED $f"
                  ;;
              esac
            done

            if [ -z "$(echo $UNRESOLVED | tr -d ' ')" ]; then
              git commit -m "Merge upstream/main into main"
              echo "status=clean" >> $GITHUB_OUTPUT
              echo "Auto-resolved all conflicts" >> $GITHUB_STEP_SUMMARY
            else
              git merge --abort
              echo "status=conflicted" >> $GITHUB_OUTPUT
              echo "unresolved=$UNRESOLVED" >> $GITHUB_OUTPUT
              echo "### Conflicts require manual resolution:" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "$UNRESOLVED" | tr ' ' '\n' | grep -v '^$' >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Push directly to main
        if: steps.check.outputs.has_changes == 'true' && steps.merge.outputs.status == 'clean'
        run: |
          git push origin main
          echo "### Merged and pushed directly to main — no manual action needed" >> $GITHUB_STEP_SUMMARY

      - name: Open or update conflict PR
        if: steps.check.outputs.has_changes == 'true' && steps.merge.outputs.status == 'conflicted'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UNRESOLVED="${{ steps.merge.outputs.unresolved }}"
          BEHIND="${{ steps.check.outputs.behind }}"
          NEW_COMMITS="$(git log --oneline HEAD..upstream/main | head -30)"

          EXISTING=$(gh pr list --head "upstream-sync" --state open --json number --jq '.[0].number // empty')

          # Always refresh the branch to latest upstream so the diff is meaningful
          git checkout -B upstream-sync upstream/main
          git push origin upstream-sync --force

          FILE_LIST=$(echo "$UNRESOLVED" | tr ' ' '\n' | grep -v '^$' | sed 's/^/- `/' | sed 's/$/'\''\`/')

          BODY="## Upstream Sync — Manual Resolution Required

          Upstream had **${BEHIND} new commit(s)** but the merge could not complete automatically.

          ### New upstream commits
          \`\`\`
          ${NEW_COMMITS}
          \`\`\`

          ### Files with unresolvable conflicts
          ${FILE_LIST}

          > Auto-resolved automatically: \`CHANGELOG.md\` and \`*.generated.ts\` files (if they conflicted).

          ### Resolve locally
          \`\`\`bash
          git fetch upstream
          git merge upstream/main --no-edit
          # fix conflicts in the files listed above
          git add <resolved files>
          git commit
          git push origin main
          \`\`\`

          _Once you push to \`main\`, your local sync service will pick up the changes and rebuild automatically._"

          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" \
              --title "Upstream sync: manual conflict resolution needed (${BEHIND} commits)" \
              --body "$BODY"
            echo "Updated existing PR #${EXISTING}" >> $GITHUB_STEP_SUMMARY
          else
            gh pr create \
              --title "Upstream sync: manual conflict resolution needed (${BEHIND} commits)" \
              --body "$BODY" \
              --head "upstream-sync" \
              --base "main"
          fi
